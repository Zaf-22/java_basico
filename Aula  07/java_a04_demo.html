}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:rgba(12,14,26,.95);border-bottom:1px solid var(--border);padding:12px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.topbar-left{display:flex;align-items:center;gap:14px}
.java-badge{background:var(--java);color:#000;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:4px 10px;border-radius:4px;letter-spacing:1px}
.lesson-info{font-size:13px;color:var(--muted)}.lesson-info span{color:var(--text);font-weight:600}
.nav-dots{display:flex;gap:5px}
.nd{width:22px;height:4px;border-radius:2px;background:rgba(255,255,255,.1)}
.nd.done{background:var(--accent3)}.nd.active{background:var(--accent)}

.hero{padding:52px 40px 32px;max-width:880px;margin:0 auto;animation:fu .5s ease}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.live-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-size:36px;font-weight:800;line-height:1.1;margin-bottom:12px;color:var(--text)}
.hero-sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:560px}

.content{max-width:880px;margin:0 auto;padding:0 40px 90px}
.demo-seq{display:flex;flex-direction:column;gap:16px;margin-bottom:44px}
.demo-step{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s}
.demo-step.active-step{border-color:var(--accent);box-shadow:0 0 0 3px rgba(6,182,212,.1)}

.demo-step.done-step .ds-num{background:var(--accent3);border-color:var(--accent3);color:#000}
.ds-info{flex:1}.ds-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.ds-sub{font-size:11px;color:var(--muted);margin-top:2px}
.ds-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:8px}
.badge-sw{background:rgba(167,139,250,.2);color:var(--accent2)}
.badge-en{background:rgba(6,182,212,.2);color:var(--accent)}
.badge-lb{background:rgba(244,114,182,.2);color:var(--accent5)}
.badge-gc{background:rgba(52,211,153,.2);color:var(--accent3)}
.ds-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.demo-step.active-step .ds-body,.demo-step.done-step .ds-body{max-height:2000px}
.ds-bi{padding:0 18px 18px;border-top:1px solid rgba(255,255,255,.05)}
.step-desc{font-size:13px;color:var(--muted);line-height:1.75;margin:12px 0 8px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:8px;border-left:3px solid var(--accent)}
.cb{background:#080c18;border-radius:8px;overflow:hidden;margin:10px 0;border:1px solid rgba(255,255,255,.07)}
.cb-head{background:rgba(255,255,255,.05);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05)}
.cb-lang{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--java);font-weight:600;letter-spacing:1px}
.cp-btn{background:none;border:1px solid rgba(255,255,255,.12);color:var(--muted);font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s}
.cp-btn:hover{border-color:var(--accent);color:var(--accent)}
pre{padding:16px 20px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.8;color:#94a3b8}

.num{color:#fbbf24}.vr{color:#e2e8f0}.fn{color:#c084fc}.cl{color:#fdba74}.an{color:#fb923c}
.arrow{color:#06b6d4;font-weight:700}
.terminal{background:#020609;border-radius:8px;overflow:hidden;margin:10px 0;border:1px solid rgba(255,255,255,.08)}
.term-bar{background:rgba(255,255,255,.05);padding:8px 14px;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(255,255,255,.06)}
.td{width:11px;height:11px;border-radius:50%}.tr2{background:#ff5f57}.ty{background:#ffbd2e}.tg{background:#28c840}
.term-title{flex:1;text-align:center;font-size:11px;color:rgba(255,255,255,.25);font-family:'JetBrains Mono',monospace}
.term-body{padding:14px 18px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9;color:#86efac;min-height:50px}
.term-label{color:rgba(255,255,255,.25);font-size:10px;margin-bottom:4px}
.tip-box{background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.2);border-radius:8px;padding:11px 14px;font-size:12px;color:var(--muted);line-height:1.6;margin-top:10px}
.tip-box strong{color:var(--accent4)}
.ds-actions{display:flex;gap:8px;margin-top:14px}
.ds-btn{font-size:12px;padding:7px 18px;border-radius:7px;border:none;cursor:pointer;font-family:'Sora',sans-serif;font-weight:600;transition:all .15s}
.btn-done{background:var(--accent3);color:#000}.btn-done:hover{opacity:.85}

.nav-footer{max-width:880px;margin:0 auto;padding:0 40px 60px;display:flex;justify-content:space-between;align-items:center}
.nav-btn{display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:11px 22px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;transition:all .2s}

.nav-btn.next{background:var(--accent);border-color:var(--accent);color:#000}
.nav-btn.next:hover{background:#22d3ee}
</style>

<script>
const DEMOS = [
  {
    title: 'switch com String — classificador de comandos',
    sub: '~10 min · Crie ComandoSwitch.java',
    badge: 'badge-sw', badgeLabel: 'switch String',
    desc: 'O switch aceita String desde o Java 7. Use .toLowerCase() antes para normalizar a entrada e evitar duplicar cases para maiúsculas/minúsculas.',
    code: `<span class="an">import</span> java.util.Scanner;

<span class="kw">public class</span> <span class="cl">ComandoSwitch</span> {
    <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {
        <span class="cl">Scanner</span> sc = <span class="kw">new</span> <span class="cl">Scanner</span>(System.in);
        System.out.print(<span class="str">"Comando (iniciar/pausar/parar/status): "</span>);
        <span class="cl">String</span> cmd = sc.next().<span class="fn">toLowerCase</span>().<span class="fn">trim</span>();

        <span class="kw">switch</span> (cmd) {
            <span class="kw">case</span> <span class="str">"iniciar"</span>: <span class="kw">case</span> <span class="str">"start"</span>:
                System.out.println(<span class="str">"▶ Sistema iniciado."</span>);
                <span class="kw">break</span>;
            <span class="kw">case</span> <span class="str">"pausar"</span>: <span class="kw">case</span> <span class="str">"pause"</span>:
                System.out.println(<span class="str">"⏸ Sistema pausado."</span>);
                <span class="kw">break</span>;
            <span class="kw">case</span> <span class="str">"parar"</span>: <span class="kw">case</span> <span class="str">"stop"</span>:
                System.out.println(<span class="str">"⏹ Sistema encerrado."</span>);
                <span class="kw">break</span>;
            <span class="kw">case</span> <span class="str">"status"</span>:
                System.out.println(<span class="str">"ℹ Verificando status..."</span>);
                <span class="kw">break</span>;
            <span class="kw">default</span>:
                System.out.println(<span class="str">"❌ Comando desconhecido: "</span> + cmd);
        }
        sc.close();
    }
}`,
    output: `Comando: iniciar
▶ Sistema iniciado.

Comando: STOP
⏹ Sistema encerrado.`,
    tip: '<strong>fall-through intencional:</strong> <code>case "iniciar": case "start":</code> sem break entre eles é o único uso válido de fall-through — agrupar aliases para o mesmo comportamento. O break no final do bloco encerra ambos.'
  },
  {
    title: 'switch expression com → (Java 14+)',
    sub: '~10 min · Crie SwitchExpression.java',
    badge: 'badge-sw', badgeLabel: 'switch →',
    desc: 'A nova sintaxe elimina break, agrupa valores com vírgula e retorna um valor diretamente. Use yield quando o ramo precisa de mais de uma linha.',
    code: `<span class="kw">public class</span> <span class="cl">SwitchExpression</span> {
    <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {

        <span class="cm">// Switch expression — atribui diretamente, sem break</span>
        <span class="kw">for</span> (<span class="tp">int</span> mes = <span class="num">1</span>; mes &lt;= <span class="num">12</span>; mes++) {

            <span class="cl">String</span> estacao = <span class="kw">switch</span> (mes) {
                <span class="kw">case</span> <span class="num">12</span>, <span class="num">1</span>, <span class="num">2</span>   <span class="arrow">-></span> <span class="str">"Verão"</span>;
                <span class="kw">case</span> <span class="num">3</span>, <span class="num">4</span>, <span class="num">5</span>   <span class="arrow">-></span> <span class="str">"Outono"</span>;
                <span class="kw">case</span> <span class="num">6</span>, <span class="num">7</span>, <span class="num">8</span>   <span class="arrow">-></span> <span class="str">"Inverno"</span>;
                <span class="kw">case</span> <span class="num">9</span>, <span class="num">10</span>, <span class="num">11</span> <span class="arrow">-></span> <span class="str">"Primavera"</span>;
                <span class="kw">default</span>          <span class="arrow">-></span> <span class="str">"?"</span>;
            };

            <span class="cm">// yield para blocos com múltiplas linhas</span>
            <span class="tp">int</span> diasMes = <span class="kw">switch</span> (mes) {
                <span class="kw">case</span> <span class="num">2</span> <span class="arrow">-></span> {
                    <span class="tp">boolean</span> bissexto = (mes == <span class="num">2</span>); <span class="cm">// simplificado</span>
                    <span class="kw">yield</span> bissexto ? <span class="num">29</span> : <span class="num">28</span>;
                }
                <span class="kw">case</span> <span class="num">4</span>, <span class="num">6</span>, <span class="num">9</span>, <span class="num">11</span> <span class="arrow">-></span> <span class="num">30</span>;
                <span class="kw">default</span>           <span class="arrow">-></span> <span class="num">31</span>;
            };

            System.out.printf(<span class="str">"Mês %2d: %-11s (%d dias)%n"</span>, mes, estacao, diasMes);
        }
    }
}`,
    output: `Mês  1: Verão       (31 dias)
Mês  2: Verão       (29 dias)
Mês  3: Outono      (31 dias)
...
Mês 12: Verão       (31 dias)`,
    tip: '<strong>yield</strong> é a palavra reservada para retornar valor dentro de um bloco <code>{ }</code> num switch expression. Fora de blocos, use apenas a seta: <code>case X -> valor;</code>. Não confunda com <code>return</code> — yield só funciona dentro de switch expression.'
  },
  {
    title: 'enum + switch — sistema de permissões',
    sub: '~10 min · Crie Permissoes.java',
    badge: 'badge-en', badgeLabel: 'enum',
    desc: 'Enum define constantes nomeadas com type-safety. Combinado com switch expression, o compilador avisa se algum case for esquecido.',
    code: `<span class="kw">public class</span> <span class="cl">Permissoes</span> {

    <span class="kw">enum</span> <span class="cl">Perfil</span> { VISITANTE, USUARIO, MODERADOR, ADMIN }

    <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {

        <span class="kw">for</span> (<span class="cl">Perfil</span> p : <span class="cl">Perfil</span>.<span class="fn">values</span>()) {

            <span class="cm">// Switch expression com enum — sem default se todos os cases cobertos</span>
            <span class="tp">int</span> nivel = <span class="kw">switch</span> (p) {
                <span class="kw">case</span> VISITANTE   <span class="arrow">-></span> <span class="num">0</span>;
                <span class="kw">case</span> USUARIO     <span class="arrow">-></span> <span class="num">1</span>;
                <span class="kw">case</span> MODERADOR   <span class="arrow">-></span> <span class="num">2</span>;
                <span class="kw">case</span> ADMIN       <span class="arrow">-></span> <span class="num">3</span>;
            };

            <span class="cl">String</span> permissoes = <span class="kw">switch</span> (p) {
                <span class="kw">case</span> VISITANTE   <span class="arrow">-></span> <span class="str">"Apenas leitura"</span>;
                <span class="kw">case</span> USUARIO     <span class="arrow">-></span> <span class="str">"Leitura + comentários"</span>;
                <span class="kw">case</span> MODERADOR   <span class="arrow">-></span> <span class="str">"Leitura + editar + apagar"</span>;
                <span class="kw">case</span> ADMIN       <span class="arrow">-></span> <span class="str">"Acesso total"</span>;
            };

            System.out.printf(<span class="str">"[Nível %d] %-12s → %s%n"</span>, nivel, p, permissoes);
        }
    }
}`,
    output: `[Nível 0] VISITANTE   → Apenas leitura
[Nível 1] USUARIO     → Leitura + comentários
[Nível 2] MODERADOR   → Leitura + editar + apagar
[Nível 3] ADMIN       → Acesso total`,
    tip: '<strong>Perfil.values()</strong> retorna um array com todos os valores do enum na ordem de declaração — perfeito para iterar. Quando o switch cobre todos os valores do enum e não tem <code>default</code>, o compilador garante que nenhum caso foi esquecido (exhaustiveness check).'
  },
  {
    title: 'labeled break — busca em matriz',
    sub: '~10 min · Crie BuscaMatriz.java',
    badge: 'badge-lb', badgeLabel: 'labeled break',
    desc: 'Sem labeled break, ao encontrar o valor no laço interno você não consegue sair do laço externo de forma limpa. O rótulo resolve isso sem variável de controle extra.',
    code: `<span class="kw">public class</span> <span class="cl">BuscaMatriz</span> {
    <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {

        <span class="tp">int</span>[][] tabela = {
            {<span class="num">10</span>, <span class="num">20</span>, <span class="num">30</span>},
            {<span class="num">40</span>, <span class="num">55</span>, <span class="num">60</span>},
            {<span class="num">70</span>, <span class="num">80</span>, <span class="num">90</span>}
        };
        <span class="tp">int</span> alvo = <span class="num">55</span>;

        <span class="cm">// Versão SEM labeled break — precisa de flag extra</span>
        <span class="tp">boolean</span> achou = <span class="kw">false</span>;
        <span class="kw">for</span> (<span class="tp">int</span> i = <span class="num">0</span>; i &lt; tabela.length && !achou; i++)
            <span class="kw">for</span> (<span class="tp">int</span> j = <span class="num">0</span>; j &lt; tabela[i].length; j++)
                <span class="kw">if</span> (tabela[i][j] == alvo) { achou = <span class="kw">true</span>; <span class="kw">break</span>; }

        <span class="cm">// Versão COM labeled break — mais direta</span>
        <span class="fn">procura</span>:
        <span class="kw">for</span> (<span class="tp">int</span> i = <span class="num">0</span>; i &lt; tabela.length; i++) {
            <span class="kw">for</span> (<span class="tp">int</span> j = <span class="num">0</span>; j &lt; tabela[i].length; j++) {
                <span class="kw">if</span> (tabela[i][j] == alvo) {
                    System.out.printf(<span class="str">"Valor %d em [%d][%d]%n"</span>, alvo, i, j);
                    <span class="kw">break</span> <span class="fn">procura</span>;  <span class="cm">// sai do laço 'procura' imediatamente</span>
                }
            }
        }
    }
}`,
    output: `Valor 55 em [1][1]`,
    tip: '<strong>Alternativa mais limpa:</strong> extrair a busca para um método e usar <code>return</code> é preferível ao labeled break em produção. Porém, quando você ainda não aprendeu métodos, o labeled break é a ferramenta certa. Na Aula de Métodos você vai refatorar esse código.'
  },
  {
    title: 'guard clause — validação sem else aninhado',
    sub: '~10 min · Crie Validador.java',
    badge: 'badge-gc', badgeLabel: 'guard clause',
    desc: 'Guard clauses usam return antecipado para tratar casos inválidos primeiro, deixando o "caminho feliz" limpo no final do método sem indentação excessiva.',
    code: `<span class="an">import</span> java.util.Scanner;

<span class="kw">public class</span> <span class="cl">Validador</span> {

    <span class="cm">// Guard clause: sai cedo se inválido, caminho feliz no final</span>
    <span class="kw">static void</span> <span class="fn">processarPedido</span>(<span class="cl">String</span> produto, <span class="tp">int</span> qtd, <span class="tp">double</span> preco) {

        <span class="kw">if</span> (produto == <span class="kw">null</span> || produto.<span class="fn">isBlank</span>()) {
            System.out.println(<span class="str">"❌ Produto inválido."</span>);
            <span class="kw">return</span>;
        }
        <span class="kw">if</span> (qtd &lt;= <span class="num">0</span>) {
            System.out.println(<span class="str">"❌ Quantidade deve ser positiva."</span>);
            <span class="kw">return</span>;
        }
        <span class="kw">if</span> (preco &lt;= <span class="num">0</span>) {
            System.out.println(<span class="str">"❌ Preço deve ser positivo."</span>);
            <span class="kw">return</span>;
        }

        <span class="cm">// Caminho feliz — só chega aqui se tudo for válido</span>
        <span class="tp">double</span> total = qtd * preco;
        System.out.printf(<span class="str">"✅ Pedido: %dx %s = R$ %.2f%n"</span>, qtd, produto, total);
    }

    <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {
        <span class="fn">processarPedido</span>(<span class="str">"Notebook"</span>, <span class="num">2</span>, <span class="num">3500.0</span>);   <span class="cm">// ✅</span>
        <span class="fn">processarPedido</span>(<span class="str">""</span>, <span class="num">1</span>, <span class="num">100.0</span>);           <span class="cm">// ❌</span>
        <span class="fn">processarPedido</span>(<span class="str">"Mouse"</span>, -<span class="num">1</span>, <span class="num">50.0</span>);       <span class="cm">// ❌</span>
        <span class="fn">processarPedido</span>(<span class="str">"Teclado"</span>, <span class="num">3</span>, <span class="num">0</span>);          <span class="cm">// ❌</span>
    }
}`,
    output: `✅ Pedido: 2x Notebook = R$ 7000,00
❌ Produto inválido.
❌ Quantidade deve ser positiva.
❌ Preço deve ser positivo.`,
    tip: '<strong>isBlank() vs isEmpty():</strong> <code>isEmpty()</code> retorna true apenas para <code>""</code>. <code>isBlank()</code> (Java 11+) retorna true também para strings com só espaços: <code>"   "</code>. Para validar entrada do usuário, sempre prefira <code>isBlank()</code>.'
  }
];

let doneSteps = new Set();

function build() {
  const el = document.getElementById('demos');
  DEMOS.forEach((d, i) => {
    const div = document.createElement('div');
    div.className = 'demo-step' + (i === 0 ? ' active-step' : '');
    div.id = 'ds-' + i;
    div.innerHTML = `
      <div class="ds-head" onclick="togStep(${i})">
        <div class="ds-num">${i+1}</div>
        <div class="ds-info">
          <div class="ds-title">${d.title}</div>
          <div class="ds-sub">${d.sub}</div>
        </div>
        <span class="ds-badge ${d.badge}">${d.badgeLabel}</span>
      </div>
      <div class="ds-body">
        <div class="ds-bi">
          <div class="step-desc">${d.desc}</div>
          <div class="cb">
            <div class="cb-head"><span class="cb-lang">JAVA — ${d.title.split('—')[0].trim()}</span><button class="cp-btn" onclick="cpStep(this)">Copiar</button></div>
            <pre>${d.code}</pre>
          </div>
          <div class="terminal">
            <div class="term-bar"><span class="td tr2"></span><span class="td ty"></span><span class="td tg"></span><span class="term-title">Saída esperada</span></div>
            <div class="term-body"><div class="term-label">// Console output</div>${d.output}</div>
          </div>
          <div class="tip-box">${d.tip}</div>
          <div class="ds-actions">
            <button class="ds-btn btn-done" onclick="markDone(${i})">✓ Feito — próxima demo</button>
          </div>
        </div>
      </div>`;
    el.appendChild(div);
  });
}

function togStep(i) {
  const c = document.getElementById('ds-' + i);
  const isActive = c.classList.contains('active-step');
  document.querySelectorAll('.demo-step').forEach(x => x.classList.remove('active-step'));
  if (!isActive) c.classList.add('active-step');
}

function markDone(i) {
  doneSteps.add(i);
  const c = document.getElementById('ds-' + i);
  c.classList.remove('active-step');
  c.classList.add('done-step');
  c.querySelector('.ds-num').textContent = '✓';
  const btn = c.querySelector('.btn-done');
  btn.textContent = 'Concluído!'; btn.disabled = true; btn.style.opacity = '.5';
  if (i + 1 < DEMOS.length) {
    const next = document.getElementById('ds-' + (i + 1));
    next.classList.add('active-step');
    setTimeout(() => next.scrollIntoView({ behavior:'smooth', block:'nearest' }), 150);
  }
}

function cpStep(btn) {
  const pre = btn.closest('.cb').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText);
  btn.textContent = 'Copiado!';
  setTimeout(() => btn.textContent = 'Copiar', 2000);
}

build();
</script>
</body>
</html>
