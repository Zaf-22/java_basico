<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}

.badge{background:#f97316;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}

.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}

.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}

.k{color:#93c5fd}.t{color:#34d399}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}.fn{color:#fbbf24}.cl{color:#c4b5fd}.an{color:#fb923c}

.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#f97316;color:#fff;border-color:#f97316}
.nb.pr:hover{background:#ea580c}.nb:disabled{opacity:.35;pointer-events:none}

.csh{padding:8px 13px;font-size:12px;font-weight:600}

.qb{margin-bottom:16px}

.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}

.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}

.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.fluxo{display:flex;flex-direction:column;align-items:center;gap:0;margin:12px 0}
.fluxo-box{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;color:#1e293b;text-align:center;min-width:200px}
.fluxo-box.cond{background:#fff7ed;border-color:#fdba74;color:#c2410c}
.fluxo-box.sim{background:#f0fdf4;border-color:#86efac;color:#15803d}
.fluxo-box.nao{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.fluxo-seta{font-size:18px;color:#94a3b8;line-height:1;padding:3px 0}
.fluxo-bifurca{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;margin:3px 0}
.fluxo-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;text-align:center;margin-bottom:4px}
.diff-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}

.diff-tag.a{background:#fee2e2;color:#991b1b}

<script>
var cur=0,timerStarted=false,timerInterval=null;
var SLIDES=[
function(){return `<div class="ey">Abertura · 3 min</div><div class="stitle">Java aprende a tomar decisões</div><div class="ssub">Sem condicionais, o programa executa linha por linha sem escolha. Com <code>if</code>, ele avalia uma expressão e decide qual caminho seguir. É a base de toda lógica de negócio em Java.</div><div class="cards"><div class="card ac"><div class="ci">☕</div><div class="ct">Java é fortemente tipado</div><div class="cb">Diferente de Python, em Java cada variável tem tipo declarado. A condição do <code>if</code> deve ser um <code>boolean</code> — nunca um número inteiro.</div></div><div class="card ac"><div class="ci">🔀</div><div class="ct">if — palavra-chave</div><div class="cb"><code>if</code> avalia uma expressão booleana. Se <code>true</code>, executa o bloco entre chaves <code>{}</code>. Em Java, as chaves substituem a indentação do Python.</div></div><div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Quando vocês fazem login em um sistema, o que o servidor verifica? Usuário correto? Senha? Permissões? Tudo isso é um if!"</em></div></div><div class="card"><div class="ci">🎯</div><div class="ct">O que veremos hoje</div><div class="cb">if, else if, else, operadores de comparação, operadores lógicos (<code>&&</code>, <code>||</code>, <code>!</code>), blocos com <code>{}</code> e erros comuns.</div></div></div>`;},
function(){return `<div class="ey">Conceito central · 3 min</div><div class="stitle">O fluxo de decisão em Java</div><div class="ssub">Java usa chaves <code>{}</code> para delimitar blocos — ao contrário de Python que usa indentação. O <code>if</code> avalia uma expressão booleana e executa apenas o bloco correspondente.</div><div class="fluxo"><div class="fluxo-box">Início do programa</div><div class="fluxo-seta">↓</div><div class="fluxo-box cond">Condição: nota >= 5.0?</div><div class="fluxo-seta">↓</div><div class="fluxo-bifurca"><div><div class="fluxo-label">true</div><div class="fluxo-box sim">System.out.println("Aprovado!")</div></div><div><div class="fluxo-label">false</div><div class="fluxo-box nao">System.out.println("Reprovado")</div></div></div><div class="fluxo-seta">↓</div><div class="fluxo-box">Continua o programa</div></div><div class="hl"><strong>Diferença Java vs Python:</strong> Em Python o bloco é definido por indentação. Em Java, as chaves <code>{ }</code> definem onde o bloco começa e termina. Indentação em Java é boa prática, mas não obrigatória.</div>`;},
function(){return `<div class="ey">Sintaxe · 4 min</div><div class="stitle">if, else if, else — estrutura completa em Java</div><div class="ssub">Java usa <code>else if</code> (duas palavras, com espaço) ao contrário do <code>elif</code> do Python. Cada bloco é delimitado por chaves <code>{}</code>.</div><div class="cw"><div class="ch"><span>Java · if, else if, else</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="t">double</span> nota = <span class="v">8.5</span>;\n\n<span class="k">if</span> (nota >= <span class="v">9.0</span>) {\n    <span class="cl">System</span>.out.println(<span class="s">"Conceito A — Excelente!"</span>);\n} <span class="k">else if</span> (nota >= <span class="v">7.0</span>) {\n    <span class="cl">System</span>.out.println(<span class="s">"Conceito B — Bom!"</span>);\n} <span class="k">else if</span> (nota >= <span class="v">5.0</span>) {\n    <span class="cl">System</span>.out.println(<span class="s">"Conceito C — Aprovado"</span>);\n} <span class="k">else</span> {\n    <span class="cl">System</span>.out.println(<span class="s">"Reprovado"</span>);\n}\n\n<span class="cm">// nota = 8.5 → entra no segundo bloco → "Conceito B"</span></pre></div><div class="hl"><strong>Parênteses são obrigatórios</strong> em Java ao redor da condição. <code>if (condição)</code> — diferente de Python que não usa parênteses. E o ponto-e-vírgula <code>;</code> termina cada instrução.</div>`;},
function(){return `<div class="ey">Tipos e Variáveis · 3 min</div><div class="stitle">Tipos em Java — int, double, boolean, String</div><div class="ssub">Em Java, o tipo da variável define quais operações são válidas. A condição do <code>if</code> deve resultar em <code>boolean</code>.</div><div class="compare"><div class="cs"><div class="csh" style="background:#fff7ed;color:#c2410c">☕ Java — tipagem estática</div><div class="csb"><pre style="background:#1e293b;color:#e2e8f0;padding:8px;font-size:11px;border-radius:4px"><span class="t">int</span>     idade = <span class="v">20</span>;\n<span class="t">double</span>  nota  = <span class="v">8.5</span>;\n<span class="t">boolean</span> ativo = <span class="k">true</span>;\n<span class="cl">String</span>  nome  = <span class="s">"Ana"</span>;</pre>Tipo declarado. Erro em tempo de compilação se errar o tipo.</div></div><div class="cs"><div class="csh" style="background:#ecfeff;color:#0e7490">🐍 Python — tipagem dinâmica</div><div class="csb"><pre style="background:#1e293b;color:#e2e8f0;padding:8px;font-size:11px;border-radius:4px">idade = 20\nnota  = 8.5\nativo = True\nnome  = "Ana"</pre>Sem declaração de tipo. Mais flexível, mas erros aparecem em tempo de execução.</div></div></div><div class="cw"><div class="ch"><span>Java · boolean na prática</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="t">boolean</span> maiorDeIdade = idade >= <span class="v">18</span>; <span class="cm">// true</span>\n\n<span class="k">if</span> (maiorDeIdade) {\n    <span class="cl">System</span>.out.println(<span class="s">"Acesso permitido"</span>);\n}</pre></div>`;},
function(){return `<div class="ey">Operadores · 4 min</div><div class="stitle">Operadores de comparação em Java</div><div class="ssub">Os operadores de comparação retornam um <code>boolean</code>. São muito similares ao Python, exceto para Strings — que em Java usam <code>.equals()</code>.</div><div class="cw"><div class="ch"><span>Java · Operadores de comparação</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="t">int</span> x = <span class="v">10</span>;\n\n<span class="cl">System</span>.out.println(x == <span class="v">10</span>);  <span class="cm">// true  → igual</span>\n<span class="cl">System</span>.out.println(x != <span class="v">5</span>);   <span class="cm">// true  → diferente</span>\n<span class="cl">System</span>.out.println(x >  <span class="v">8</span>);   <span class="cm">// true  → maior que</span>\n<span class="cl">System</span>.out.println(x <  <span class="v">8</span>);   <span class="cm">// false → menor que</span>\n<span class="cl">System</span>.out.println(x >= <span class="v">10</span>);  <span class="cm">// true  → maior ou igual</span>\n<span class="cl">System</span>.out.println(x <= <span class="v">9</span>);   <span class="cm">// false → menor ou igual</span>\n\n<span class="cm">// ⚠️ CUIDADO: String usa .equals(), não ==</span>\n<span class="cl">String</span> cor = <span class="s">"azul"</span>;\n<span class="k">if</span> (cor.equals(<span class="s">"azul"</span>)) {       <span class="cm">// ✅ correto</span>\n    <span class="cl">System</span>.out.println(<span class="s">"É azul!"</span>);\n}</pre></div><div class="hl"><strong>String nunca usa == em Java.</strong> O <code>==</code> compara referências de memória, não o conteúdo. Use sempre <code>.equals()</code> para comparar Strings. Esse é um dos erros mais comuns em Java.</div>`;},
function(){return `<div class="ey">Lógica · 3 min</div><div class="stitle">&&, ||, ! — operadores lógicos em Java</div><div class="ssub">Em Java os operadores lógicos são símbolos, ao contrário das palavras <code>and</code>, <code>or</code>, <code>not</code> do Python.</div><div class="cw"><div class="ch"><span>Java · Operadores lógicos</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="t">int</span>     idade      = <span class="v">20</span>;\n<span class="t">boolean</span> temCarteira = <span class="k">true</span>;\n\n<span class="cm">// && → AND: as DUAS precisam ser true</span>\n<span class="k">if</span> (idade >= <span class="v">18</span> && temCarteira) {\n    <span class="cl">System</span>.out.println(<span class="s">"Pode dirigir"</span>);\n}\n\n<span class="cm">// || → OR: basta UMA ser true</span>\n<span class="cl">String</span> dia = <span class="s">"sábado"</span>;\n<span class="k">if</span> (dia.equals(<span class="s">"sábado"</span>) || dia.equals(<span class="s">"domingo"</span>)) {\n    <span class="cl">System</span>.out.println(<span class="s">"Fim de semana!"</span>);\n}\n\n<span class="cm">// ! → NOT: inverte o boolean</span>\n<span class="t">boolean</span> chovendo = <span class="k">false</span>;\n<span class="k">if</span> (!chovendo) {\n    <span class="cl">System</span>.out.println(<span class="s">"Pode sair sem guarda-chuva"</span>);\n}</pre></div><div class="cards"><div class="card ac"><div class="ci">🔗</div><div class="ct">&& — E lógico</div><div class="cb">Python: <code>and</code>. Java: <code>&&</code>. Todos devem ser <code>true</code>.</div></div><div class="card ac"><div class="ci">🔀</div><div class="ct">|| — OU lógico</div><div class="cb">Python: <code>or</code>. Java: <code>||</code>. Basta um <code>true</code>.</div></div><div class="card ac"><div class="ci">🔄</div><div class="ct">! — inversão</div><div class="cb">Python: <code>not</code>. Java: <code>!</code>. Inverte o boolean.</div></div></div>`;},
function(){return `<div class="ey">Leitura de dados · 3 min</div><div class="stitle">Scanner — lendo dados do usuário em Java</div><div class="ssub">Em Python usamos <code>input()</code>. Em Java usamos a classe <code>Scanner</code> do pacote <code>java.util</code>. Precisamos importar e instanciar antes de usar.</div><div class="cw"><div class="ch"><span>Java · Leitura com Scanner</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="an">import</span> java.util.Scanner;\n\n<span class="k">public class</span> <span class="cl">Exemplo</span> {\n    <span class="k">public static void</span> <span class="fn">main</span>(<span class="cl">String</span>[] args) {\n\n        <span class="cl">Scanner</span> sc = <span class="k">new</span> <span class="cl">Scanner</span>(<span class="cl">System</span>.in);\n\n        <span class="cl">System</span>.out.print(<span class="s">"Digite sua nota: "</span>);\n        <span class="t">double</span> nota = sc.nextDouble();\n\n        <span class="k">if</span> (nota >= <span class="v">5.0</span>) {\n            <span class="cl">System</span>.out.println(<span class="s">"Aprovado!"</span>);\n        } <span class="k">else</span> {\n            <span class="cl">System</span>.out.println(<span class="s">"Reprovado."</span>);\n        }\n    }\n}</pre></div><div class="hl"><strong>Métodos do Scanner:</strong> <code>nextInt()</code> lê inteiro, <code>nextDouble()</code> lê decimal, <code>next()</code> lê uma palavra, <code>nextLine()</code> lê linha completa. Cada tipo de dado tem seu método específico.</div>`;},
function(){return `<div class="ey">Exemplo completo · 3 min</div><div class="stitle">Classificador de IMC em Java — programa completo</div><div class="ssub">Unindo Scanner, tipos, if, else if e else para criar um programa que calcula e classifica o IMC do usuário em quatro faixas.</div><div class="cw"><div class="ch"><span>Java · Classificador de IMC completo</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="an">import</span> java.util.Scanner;\n\n<span class="k">public class</span> <span class="cl">IMC</span> {\n    <span class="k">public static void</span> <span class="fn">main</span>(<span class="cl">String</span>[] args) {\n        <span class="cl">Scanner</span> sc = <span class="k">new</span> <span class="cl">Scanner</span>(<span class="cl">System</span>.in);\n\n        <span class="cl">System</span>.out.print(<span class="s">"Peso (kg): "</span>);\n        <span class="t">double</span> peso = sc.nextDouble();\n\n        <span class="cl">System</span>.out.print(<span class="s">"Altura (m): "</span>);\n        <span class="t">double</span> altura = sc.nextDouble();\n\n        <span class="t">double</span> imc = peso / (altura * altura);\n        <span class="cl">String</span> classe;\n\n        <span class="k">if</span> (imc < <span class="v">18.5</span>) {\n            classe = <span class="s">"Abaixo do peso"</span>;\n        } <span class="k">else if</span> (imc < <span class="v">25.0</span>) {\n            classe = <span class="s">"Peso normal"</span>;\n        } <span class="k">else if</span> (imc < <span class="v">30.0</span>) {\n            classe = <span class="s">"Sobrepeso"</span>;\n        } <span class="k">else</span> {\n            classe = <span class="s">"Obesidade"</span>;\n        }\n\n        <span class="cl">System</span>.out.printf(<span class="s">"IMC: %.1f → %s%n"</span>, imc, classe);\n    }\n}</pre></div><div class="hl"><strong>printf vs println:</strong> <code>System.out.printf</code> formata a saída como C. <code>%.1f</code> = double com 1 casa decimal. <code>%s</code> = String. <code>%n</code> = quebra de linha (portável entre sistemas operacionais).</div>`;},
function(){return `<div class="ey">Quiz · 3 min</div><div class="stitle">Verificação de aprendizagem</div><div class="ssub">Turma responde junto.</div><div class="qb"><div class="qa">1. Como comparar duas Strings em Java para saber se têm o mesmo conteúdo?</div><div class="qo"><div class="qop" onclick="ansQ(this,'w','f0')"><span>A</span><code>if (nome == "Ana")</code></div><div class="qop" onclick="ansQ(this,'c','f0')"><span>B</span><code>if (nome.equals("Ana"))</code></div><div class="qop" onclick="ansQ(this,'w','f0')"><span>C</span><code>if (nome === "Ana")</code></div><div class="qop" onclick="ansQ(this,'w','f0')"><span>D</span><code>if (nome.compare("Ana"))</code></div></div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! Em Java, <code>==</code> para Strings compara a referência de memória, não o conteúdo. Sempre use <code>.equals()</code> para comparar o valor do texto.</div></div><div class="qb"><div class="qa">2. Qual é o equivalente Java do operador <code>and</code> do Python?</div><div class="qo"><div class="qop" onclick="ansQ(this,'w','f1')"><span>A</span><code>&</code></div><div class="qop" onclick="ansQ(this,'c','f1')"><span>B</span><code>&&</code></div><div class="qop" onclick="ansQ(this,'w','f1')"><span>C</span><code>AND</code></div><div class="qop" onclick="ansQ(this,'w','f1')"><span>D</span><code>and</code></div></div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! Em Java: <code>&&</code> (AND), <code>||</code> (OR), <code>!</code> (NOT). Em Python: <code>and</code>, <code>or</code>, <code>not</code>. Java usa símbolos; Python usa palavras.</div></div>`;},
function(){return `<div class="ey">Encerramento · 1 min</div><div class="stitle">Recapitulando</div><div class="ssub">O que aprendemos e o que faremos agora.</div><div class="rl"><div class="ri"><div class="rn">1</div><div class="rt"><strong>if avalia uma condição booleana.</strong> A condição fica entre parênteses <code>()</code> e o bloco entre chaves <code>{}</code>. Ponto-e-vírgula <code>;</code> termina cada instrução.</div></div><div class="ri"><div class="rn">2</div><div class="rt"><strong>else if adiciona mais condições.</strong> Dois palavras em Java (ao contrário de <code>elif</code> no Python). Só um bloco executa.</div></div><div class="ri"><div class="rn">3</div><div class="rt"><strong>else captura o restante.</strong> Executa quando nenhuma condição anterior foi <code>true</code>. É opcional.</div></div><div class="ri"><div class="rn">4</div><div class="rt"><strong>String usa .equals().</strong> Nunca <code>==</code> para comparar Strings em Java. Esse é o erro mais clássico de iniciantes.</div></div><div class="ri"><div class="rn">5</div><div class="rt"><strong>&&, ||, ! para lógica.</strong> Equivalentes a <code>and</code>, <code>or</code>, <code>not</code> do Python. Combinam condições booleanas.</div></div></div><div class="hl"><strong>Próximo passo:</strong> prática guiada com scanner e condicionais — verificador de acesso, classificador de notas e calculadora de IMC em Java.</div>`;}
];
function buildDots(){var b=document.getElementById('dots-bar');b.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');(function(idx){d.onclick=function(){goTo(idx);};})(i);b.appendChild(d);if(i<SLIDES.length-1){var s=document.createElement('div');s.className='dsep';b.appendChild(s);}}}
function buildSlides(){var w=document.getElementById('slide-wrap');w.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+i;d.innerHTML=SLIDES[i]();w.appendChild(d);}}
function goTo(i){document.getElementById('sl-'+cur).classList.remove('active');var dots=document.querySelectorAll('.dot');dots[cur].classList.remove('active');if(i>cur)dots[cur].classList.add('done');cur=i;var el=document.getElementById('sl-'+cur);el.innerHTML=SLIDES[cur]();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=(cur===0);var bn=document.getElementById('btn-next');bn.disabled=(cur===SLIDES.length-1);bn.textContent=cur===SLIDES.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;if(!timerStarted){timerStarted=true;startTimer();}}
function goNav(d){var n=cur+d;if(n>=0&&n<SLIDES.length)goTo(n);}
function startTimer(){var r=35*60;var el=document.getElementById('timer');timerInterval=setInterval(function(){r--;var m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(timerInterval);el.textContent='00:00';}},1000);}
function ansQ(el,t,id){var qb=el.closest('.qb');qb.querySelectorAll('.qop').forEach(function(o){if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});var fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Não exatamente — reveja os operadores e a sintaxe Java.';}fb.style.display='block';}
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;
</script>
